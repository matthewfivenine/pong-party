<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pong Party</title>
<style>
  body{margin:0;background:#050a0e;color:#00ffe7;font-family:'Share Tech Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
  canvas{border:1px solid rgba(0,255,231,.18)}
  #lobby,#game{display:flex;flex-direction:column;align-items:center;gap:10px}
  #sbox,#game{display:none}
</style>
</head>
<body>

<div id="lobby">
  <h1>Pong Party</h1>
  <input id="ri" placeholder="ROOM NAME">
  <button id="cb">CREATE</button>
  <input id="ji" placeholder="ROOM NAME">
  <button id="jb">JOIN</button>
  <div id="sbox">
    Share: <span id="surl"></span>
  </div>
</div>

<div id="game">
  <canvas id="c" width="800" height="450"></canvas>
</div>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W=cv.width,H=cv.height;
let role=null, ws=null, room=null;
let state={ball:{x:.5,y:.5},padLeft:.4,padRight:.4,scores:{left:0,right:0}};
function rnd(){return Math.random().toString(36).slice(2,7).toUpperCase();}
const $=id=>document.getElementById(id);

function connect(roomName){
  room=roomName;
  ws=new WebSocket(`${location.origin.replace(/^http/,'ws')}/party?room=${encodeURIComponent(roomName)}`);
  ws.onopen=()=>console.log('🟢 WS connected to',room);
  ws.onmessage=ev=>{
    const msg=JSON.parse(ev.data);
    if(msg.type==='role') role=msg.role;
    if(msg.type==='state') state=msg.state;
    if(msg.type==='end'){alert('Opponent disconnected'); location.reload();}
    if(role && state) startGameUI();
  };
}

function startGameUI(){
  $('lobby').style.display='none';
  $('game').style.display='flex';
}

$('cb').onclick=()=>{ const v=$('ri').value.trim().toUpperCase()||rnd(); connect(v); $('sbox').style.display='block'; $('surl').textContent=`${location.origin}/?room=${v}`; };
$('jb').onclick=()=>{ const v=$('ji').value.trim().toUpperCase(); if(v) connect(v); };

cv.addEventListener('mousemove',e=>{
  const y=(e.offsetY/H);
  if(role==='host'){state.padLeft=y; ws?.send(JSON.stringify({type:'pad',pad:y}))}
  if(role==='guest'){state.padRight=y; ws?.send(JSON.stringify({type:'pad',pad:y}))}
});

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff';
  ctx.fillRect(state.ball.x*W-5,state.ball.y*H-5,10,10);
  ctx.fillStyle='#0ff';
  ctx.fillRect(0,state.padLeft*H,10,H*.18);
  ctx.fillStyle='#f63';
  ctx.fillRect(W-10,state.padRight*H,10,H*.18);
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
