<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050a0e">
  <title>PONG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --p1: #00ffe7;
      --p2: #ff6b35;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      background: #050a0e;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      color: var(--p1);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .13) 2px,
          rgba(0, 0, 0, .13) 4px);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 101;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, .7) 100%);
    }

    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      padding: 0 24px;
      width: 100%;
      max-width: 440px;
    }

    #lobby h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(32px, 12vw, 52px);
      font-weight: 900;
      letter-spacing: 12px;
      text-shadow: 0 0 30px var(--p1), 0 0 60px var(--p1);
      animation: flicker 4s infinite;
    }

    .sub {
      font-size: clamp(10px, 3vw, 12px);
      letter-spacing: 5px;
      color: rgba(255, 255, 255, .35);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    input {
      background: rgba(0, 255, 231, .05);
      border: 1px solid rgba(0, 255, 231, .25);
      color: var(--p1);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      letter-spacing: 2px;
      padding: 12px 14px;
      outline: none;
      flex: 1;
      min-width: 0;
      text-transform: uppercase;
      caret-color: var(--p1);
      -webkit-appearance: none;
      border-radius: 0;
    }

    input::placeholder {
      color: rgba(0, 255, 231, .2);
    }

    input:focus {
      border-color: rgba(0, 255, 231, .5);
    }

    button {
      background: transparent;
      border: 1px solid var(--p1);
      color: var(--p1);
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      padding: 12px 16px;
      cursor: pointer;
      text-transform: uppercase;
      -webkit-appearance: none;
      border-radius: 0;
      min-height: 44px;
      white-space: nowrap;
    }

    button:active {
      background: rgba(0, 255, 231, .12);
    }

    .div {
      color: rgba(255, 255, 255, .15);
      font-size: 11px;
      letter-spacing: 3px;
    }

    #sbox {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    #sbox .lbl {
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, .3);
    }

    #surl {
      font-size: 11px;
      color: var(--p1);
      background: rgba(0, 255, 231, .05);
      border: 1px solid rgba(0, 255, 231, .2);
      padding: 10px 14px;
      cursor: pointer;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #chint {
      font-size: 10px;
      color: rgba(255, 255, 255, .2);
      letter-spacing: 2px;
    }

    #stmsg {
      font-size: 12px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, .4);
      animation: blink 1.2s infinite;
    }

    #game {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    #hdr {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 10px;
    }

    .sc {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(26px, 8vw, 52px);
      font-weight: 900;
      letter-spacing: 4px;
      line-height: 1;
      text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
      transition: transform .1s;
    }

    #sl {
      color: var(--p1);
    }

    #sr {
      color: var(--p2);
    }

    .sc.pop {
      transform: scale(1.3);
    }

    #gtit {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(9px, 2vw, 11px);
      font-weight: 700;
      letter-spacing: 6px;
      color: rgba(255, 255, 255, .22);
      text-align: center;
    }

    #wrap {
      position: relative;
    }

    canvas {
      display: block;
      border: 1px solid rgba(0, 255, 231, .18);
      box-shadow: 0 0 40px rgba(0, 255, 231, .07);
      touch-action: none;
    }

    #dz {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      background: radial-gradient(ellipse at var(--tx, 50%) var(--ty, 50%), rgba(255, 255, 255, .07) 0%, transparent 60%);
    }

    #dz.lit {
      opacity: 1;
    }

    #ctrl {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-top: 10px;
      padding: 0 4px;
    }

    .ct {
      font-size: clamp(9px, 2.5vw, 11px);
      letter-spacing: 2px;
      opacity: .38;
    }

    .ctl {
      color: var(--p1);
    }

    .ctr {
      color: var(--p2);
    }

    #badge {
      margin-top: 8px;
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, .18);
      text-align: center;
    }

    #ov {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(5, 10, 14, .88);
      backdrop-filter: blur(2px);
    }

    #ov h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 900;
      letter-spacing: 7px;
    }

    .osub {
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 4px;
      color: rgba(255, 255, 255, .35);
      animation: blink 1.2s infinite;
    }

    #wt {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(14px, 4vw, 16px);
      font-weight: 700;
      letter-spacing: 5px;
    }

    @keyframes flicker {

      0%,
      94%,
      100% {
        opacity: 1;
      }

      95% {
        opacity: .6;
      }

      97% {
        opacity: 1;
      }

      98% {
        opacity: .4;
      }
    }

    @keyframes blink {

      0%,
      49% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div id="lobby">
    <h1>PONG</h1>
    <div class="sub">online co-op</div>
    <div class="row">
      <input id="ri" placeholder="ROOM NAME" maxlength="20" autocomplete="off" spellcheck="false">
      <button id="cb">CREATE</button>
    </div>
    <div class="div">— or join —</div>
    <div class="row">
      <input id="ji" placeholder="ROOM NAME" maxlength="20" autocomplete="off" spellcheck="false">
      <button id="jb">JOIN</button>
    </div>
    <div id="sbox">
      <div class="lbl">share with opponent</div>
      <div id="surl"></div>
      <div id="chint">TAP TO COPY</div>
    </div>
    <div id="stmsg" style="display:none"></div>
  </div>

  <div id="game">
    <div id="hdr">
      <div class="sc" id="sl">0</div>
      <div id="gtit">PONG<br>ONLINE</div>
      <div class="sc" id="sr">0</div>
    </div>
    <div id="wrap">
      <canvas id="c"></canvas>
      <div id="dz"></div>
      <div id="ov">
        <div id="wt" style="display:none"></div>
        <h2 id="ot">WAITING</h2>
        <div class="osub" id="os">connecting...</div>
      </div>
    </div>
    <div id="ctrl">
      <div class="ct ctl" id="cl">YOU — DRAG</div>
      <div class="ct ctr" id="cr">DRAG — OPP</div>
    </div>
    <div id="badge"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const BASE = 'https://pong-party.onrender.com';
      const wsURL = r => BASE.replace('https://', 'wss://').replace('http://', 'ws://') + '/party/' + encodeURIComponent(r);
      const pageURL = r => BASE + '/?room=' + encodeURIComponent(r);

      const cv = document.getElementById('c'), ctx = cv.getContext('2d');
      let W, H;
      function rsz() { W = Math.min(window.innerWidth - 24, 800); H = Math.round(W * .5625); cv.width = W; cv.height = H; }
      rsz();
      addEventListener('resize', rsz);

      const PW = () => Math.round(W * .014), PH = () => Math.round(H * .18), PM = () => Math.round(W * .025), BR = () => Math.max(5, Math.round(W * .012));

      let role = null, ws = null, alive = false;
      let G = { ball: { x: .5, y: .5 }, padLeft: .41, padRight: .41, scores: { left: 0, right: 0 } };

      const $ = id => document.getElementById(id);

      function qRoom() { return new URLSearchParams(location.search).get('room'); }

      // === HOST / JOIN BUTTONS ===
      $('cb').onclick = () => { const v = $('ri').value.trim().toUpperCase(); host(v || rnd()); };
      $('jb').onclick = () => { const v = $('ji').value.trim().toUpperCase(); if (v) join(v); };
      function rnd() { return Math.random().toString(36).slice(2, 7).toUpperCase(); }

      // === HOST / JOIN LOGIC ===
      function host(room) {
        const url = pageURL(room);
        $('sbox').style.display = 'flex';
        $('surl').textContent = url;
        $('surl').onclick = () => {
          if (navigator.share) navigator.share({ title: 'PONG', url });
          else {
            navigator.clipboard?.writeText(url);
            $('chint').textContent = 'COPIED';
            setTimeout(() => $('chint').textContent = 'TAP TO COPY', 2000);
          }
        };
        setSt('waiting for opponent...');
        connect(room);
        history.replaceState({}, '', '/?room=' + room);
      }

      function join(room) {
        setSt('joining ' + room + '...');
        connect(room);
        history.replaceState({}, '', '/?room=' + room);
      }

      function setSt(m) { $('stmsg').style.display = 'block'; $('stmsg').textContent = m; }

      addEventListener('DOMContentLoaded', () => { const r = qRoom(); if (r) join(r); });

      // === WEBSOCKET CONNECT ===
      function connect(room) {
        ws = new WebSocket(wsURL(room));

        ws.onopen = () => { alive = true; setSt('connected'); };
        ws.onmessage = e => { handleMessage(JSON.parse(e.data)); };
        ws.onclose = () => { alive = false; setSt('disconnected'); };
      }

      // === HANDLE MESSAGES FROM SERVER ===
      function handleMessage(msg) {
        switch (msg.type) {
          case 'assigned':
            role = msg.role;
            break;
          case 'waiting':
            setSt('waiting for opponent...');
            break;
          case 'start':
            $('lobby').style.display = 'none';
            $('game').style.display = 'flex';
            $('stmsg').style.display = 'none';
            animate();
            break;
          case 'state':
            G.ball = msg.ball;
            G.padLeft = msg.padLeft;
            G.padRight = msg.padRight;
            G.scores = msg.scores;
            break;
          case 'scored':
            G.scores = msg.scores;
            break;
          case 'gameover':
            alert(`Winner: ${msg.winner}`);
            break;
        }
      }

      // === SEND PAD POSITION TO SERVER ===
      function sendInput(y) {
        if (!alive || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'input', y }));
      }

      // === CANVAS INTERACTION ===
      let dragging = false;
      cv.addEventListener('pointerdown', e => { dragging = true; updatePad(e); });
      cv.addEventListener('pointermove', e => { if (dragging) updatePad(e); });
      cv.addEventListener('pointerup', () => { dragging = false; });
      cv.addEventListener('pointerleave', () => { dragging = false; });

      function updatePad(e) {
        const rect = cv.getBoundingClientRect();
        let y = (e.clientY - rect.top) / rect.height;
        y = Math.max(0, Math.min(1 - PH(), y));
        if (role === 'host') G.padLeft = y;
        if (role === 'guest') G.padRight = y;
        sendInput(y);
      }

      // === GAME LOOP & DRAW ===
      function animate() {
        ctx.clearRect(0, 0, W, H);

        // Ball
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(G.ball.x * W, G.ball.y * H, BR(), 0, 2 * Math.PI);
        ctx.fill();

        // Paddles
        ctx.fillStyle = 'var(--p1)';
        ctx.fillRect(PM(), G.padLeft * H, PW(), PH());
        ctx.fillStyle = 'var(--p2)';
        ctx.fillRect(W - PM() - PW(), G.padRight * H, PW(), PH());

        // Scores
        $('sl').textContent = G.scores.left;
        $('sr').textContent = G.scores.right;

        requestAnimationFrame(animate);
      }
    });
  </script>
</body>

</html>
