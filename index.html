<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pong Party</title>
<style>
/* ... all your previous CSS ... */
</style>
</head>
<body>
<div id="lobby">
  <h1>PONG PARTY</h1>
  <div class="sub">online co-op</div>
  <div class="row">
    <input id="ri" placeholder="ROOM NAME" maxlength="20">
    <button id="cb">CREATE</button>
  </div>
  <div class="div">— or join —</div>
  <div class="row">
    <input id="ji" placeholder="ROOM NAME" maxlength="20">
    <button id="jb">JOIN</button>
  </div>
  <div id="sbox">
    <div class="lbl">share with opponent</div>
    <div id="surl"></div>
    <div id="chint">TAP TO COPY</div>
  </div>
  <div id="stmsg" style="display:none"></div>
</div>

<div id="game">
  <canvas id="c"></canvas>
  <div id="dz"></div>
  <div id="ov">
    <div id="wt" style="display:none"></div>
    <h2 id="ot">WAITING</h2>
    <div class="osub" id="os">connecting...</div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const BASE = 'https://pong-party.onrender.com'; // Render WS endpoint
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  let W, H;
  function rsz() { W = Math.min(window.innerWidth - 24, 800); H = Math.round(W * .5625); cv.width = W; cv.height = H; }
  rsz(); addEventListener('resize', rsz);

  const $ = id => document.getElementById(id);
  let ws = null, role = null;

  const qRoom = () => new URLSearchParams(location.search).get('room');

  function connect(room) {
    ws = new WebSocket(`${BASE}/party/${encodeURIComponent(room)}`);
    ws.onopen = () => {
      console.log('🟢 WS connected to', room);
      $('stmsg').style.display = 'none';
    };
    ws.onmessage = (ev) => {
      const data = JSON.parse(ev.data);
      if (data.type === 'start') {
        $('game').style.display = 'flex';
        $('lobby').style.display = 'none';
        console.log('🚀 Game started!');
        loop();
      }
    };
  }

  $('cb').onclick = () => {
    const v = $('ri').value.trim().toUpperCase() || Math.random().toString(36).slice(2,7).toUpperCase();
    $('sbox').style.display = 'flex';
    const url = window.location.origin + '/?room=' + v;
    $('surl').textContent = url;
    $('surl').onclick = () => { navigator.clipboard?.writeText(url); };
    $('stmsg').textContent = 'waiting for opponent...'; $('stmsg').style.display = 'block';
    connect(v);
  };

  $('jb').onclick = () => {
    const v = $('ji').value.trim().toUpperCase();
    if (v) { $('stmsg').textContent = 'joining room...'; $('stmsg').style.display = 'block'; connect(v); }
  };

  const r = qRoom();
  if (r) { $('stmsg').textContent = 'joining room...'; $('stmsg').style.display = 'block'; connect(r); }

  function loop() {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#fff';
    ctx.fillRect(W/2-5, H/2-5, 10, 10); // example ball
    requestAnimationFrame(loop);
  }
});
</script>
</body>
</html>
