<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
 content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050a0e">
<title>Pong Party</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root { --p1:#00ffe7; --p2:#ff6b35; }

html, body { width:100%; height:100%; overflow:hidden; background:#050a0e; font-family:'Share Tech Mono',monospace; color:var(--p1); }
body { display:flex; flex-direction:column; align-items:center; justify-content:center; }

#lobby { display:flex; flex-direction:column; align-items:center; gap:20px; text-align:center; padding:0 24px; width:100%; max-width:440px; }
#lobby h1 { font-family:'Orbitron',sans-serif; font-size:clamp(32px,12vw,52px); font-weight:900; letter-spacing:12px; text-shadow:0 0 30px var(--p1),0 0 60px var(--p1); }
.row { display:flex; gap:8px; align-items:center; width:100%; }
input { background: rgba(0,255,231,.05); border:1px solid rgba(0,255,231,.25); color:var(--p1); font-size:16px; padding:12px 14px; flex:1; text-transform:uppercase; }
button { background:transparent; border:1px solid var(--p1); color:var(--p1); font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:3px; padding:12px 16px; cursor:pointer; min-height:44px; }
#game { display:none; flex-direction:column; align-items:center; position:relative; }
canvas { display:block; border:1px solid rgba(0,255,231,.18); box-shadow:0 0 40px rgba(0,255,231,.07); }
#ov { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(5,10,14,.88); backdrop-filter:blur(2px); flex-direction:column; gap:14px; }
#wt { font-family:'Orbitron',sans-serif; font-size:16px; font-weight:700; letter-spacing:5px; }
#score { position:absolute; top:14px; font-family:'Orbitron',sans-serif; font-size:20px; color:var(--p1); text-shadow:0 0 10px var(--p1); z-index:200; }
</style>
</head>
<body>
<div id="lobby">
  <h1>Pong Party</h1>
  <div class="sub">online co-op</div>
  <div class="row">
    <input id="ri" placeholder="ROOM NAME" maxlength="20" autocomplete="off" spellcheck="false">
    <button id="cb">CREATE</button>
  </div>
  <div class="row">
    <input id="ji" placeholder="ROOM NAME" maxlength="20" autocomplete="off" spellcheck="false">
    <button id="jb">JOIN</button>
  </div>
</div>

<div id="game">
  <canvas id="c"></canvas>
  <div id="ov"><div id="wt">WAITING FOR OPPONENT</div></div>
  <div id="score"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const BASE = 'https://pong-party.onrender.com';
  const $ = id => document.getElementById(id);
  const cv = $('c'), ctx = cv.getContext('2d');
  const scoreDiv = $('score');
  let W,H;
  function rsz(){ W=window.innerWidth-24; H=W*0.5625; cv.width=W; cv.height=H; }
  rsz(); window.addEventListener('resize', rsz);

  let ws=null, role=null;
  let G={ball:{x:0.5,y:0.5}, padLeft:0.41, padRight:0.41, scores:{left:0,right:0}};
  const PW=()=>Math.round(W*0.014), PH=()=>Math.round(H*0.18), PM=()=>Math.round(W*0.025), BR=()=>Math.max(5,Math.round(W*0.012));

  function wsURL(r){ return BASE.replace(/^http/,'ws')+'/party/'+encodeURIComponent(r); }
  function rnd(){return Math.random().toString(36).slice(2,7).toUpperCase(); }

  function connect(room){
    ws = new WebSocket(wsURL(room));
    ws.onopen = ()=>console.log('🟢 WS connected to', room);
    ws.onmessage = e=>{
      const d = JSON.parse(e.data);
      if(d.type==='assigned') role=d.role;
      if(d.type==='waiting'){ $('ov').style.display='flex'; $('wt').textContent='WAITING FOR OPPONENT'; }
      if(d.type==='start'){ $('ov').style.display='none'; $('wt').textContent=''; }
      if(d.type==='state' || d.type==='scored'){ if(d.ball){ G=d; draw(); } }
      if(d.type==='gameover'){ $('ov').style.display='flex'; $('wt').textContent='GAME OVER'; if(d.ball){ G=d; draw(); } }
    };
    ws.onclose = ()=>console.log('❌ WS closed');
  }

  function host(room){ connect(room); $('lobby').style.display='none'; $('game').style.display='flex'; }
  function join(room){ connect(room); $('lobby').style.display='none'; $('game').style.display='flex'; }

  $('cb').onclick = ()=>{ const v=$('ri').value.trim().toUpperCase()||rnd(); host(v); };
  $('jb').onclick = ()=>{ const v=$('ji').value.trim().toUpperCase(); if(v) join(v); };

  function sendInput(y){
    if(ws && ws.readyState===WebSocket.OPEN && role) ws.send(JSON.stringify({type:'input', y:y}));
  }

  // Mouse
  cv.addEventListener('mousemove', e=>{
    const y = e.offsetY / H;
    if(role==='host') G.padLeft=y;
    else if(role==='guest') G.padRight=y;
    sendInput(y);
  });
  // Touch
  cv.addEventListener('touchmove', e=>{
    e.preventDefault();
    const rect=cv.getBoundingClientRect();
    const y = (e.touches[0].clientY-rect.top)/H;
    if(role==='host') G.padLeft=y;
    else if(role==='guest') G.padRight=y;
    sendInput(y);
  }, {passive:false});
  // Keyboard
  document.addEventListener('keydown', e=>{
    let y = (role==='host'?G.padLeft:G.padRight);
    if(e.key==='ArrowUp') y -= 0.03;
    if(e.key==='ArrowDown') y += 0.03;
    y=Math.max(0, Math.min(1-PH()/H, y));
    if(role==='host') G.padLeft=y;
    else if(role==='guest') G.padRight=y;
    sendInput(y);
  });

  function draw(){
    if(!G||!G.ball) return;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#00ffe7'; ctx.fillRect(PM(), G.padLeft*H, PW(), PH());
    ctx.fillStyle='#ff6b35'; ctx.fillRect(W-PM()-PW(), G.padRight*H, PW(), PH());
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(G.ball.x*W, G.ball.y*H, BR(),0,2*Math.PI); ctx.fill();
    scoreDiv.textContent = `${G.scores.left} : ${G.scores.right}`;
  }

  draw();
});
</script>
</body>
</html>
